<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCGAD | Catálogo de Herramientas Digitales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        /* Ocultar barra de desplazamiento manteniendo funcionalidad */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-20 selection:bg-blue-200 selection:text-blue-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 shrink-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl shadow-lg shadow-blue-200 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 8v6m-3-3h6" />
                    </svg>
                </div>
                <div>
                    <span class="font-extrabold tracking-tight text-slate-900 text-xl block leading-tight">SCGAD</span>
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] block mt-0.5">CHGUV</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center gap-4">
                <span id="status-badge" class="flex items-center gap-1.5 text-[10px] bg-blue-50 text-blue-700 px-3 py-1 rounded-full font-bold uppercase tracking-wider border border-blue-100 transition-colors duration-300">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse" id="status-dot"></span>
                    <span id="status-text">Sincronización Activa</span>
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-12">
        <header class="mb-12">
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3 text-balance">Catálogo de Herramientas Digitales</h2>
            <p class="text-slate-500 text-lg max-w-2xl leading-relaxed">
                Repositorio centralizado de herramientas digitales para la práctica clínica.
            </p>
        </header>

        <div class="mb-10">
            <div class="relative max-w-md group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <input type="text" id="app-search" 
                    placeholder="" 
                    class="block w-full pl-11 pr-10 py-3.5 bg-white border border-slate-200 rounded-2xl leading-5 transition-all focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 shadow-sm text-slate-600 placeholder-slate-400">
                <button id="clear-search" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 hidden">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="app-list" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Esqueletos de carga -->
            <div class="h-44 bg-white/50 border border-slate-200 rounded-3xl animate-pulse"></div>
            <div class="h-44 bg-white/50 border border-slate-200 rounded-3xl animate-pulse"></div>
            <div class="h-44 bg-white/50 border border-slate-200 rounded-3xl animate-pulse"></div>
        </div>
    </main>

    <script>
        const CONFIG = {
            user: 'MontanerMD',
            repo: 'eHealth',
            exclude: ['index.html']
        };

        let allApps = [];
        const searchInput = document.getElementById('app-search');
        const clearButton = document.getElementById('clear-search');
        const listContainer = document.getElementById('app-list');

        function updateStatus(state) {
            const badge = document.getElementById('status-badge');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            if (state === 'error') {
                badge.className = "flex items-center gap-1.5 text-[10px] bg-red-50 text-red-700 px-3 py-1 rounded-full font-bold uppercase tracking-wider border border-red-100 transition-colors duration-300";
                dot.className = "w-1.5 h-1.5 bg-red-500 rounded-full";
                text.textContent = "Desconectado";
            } else if (state === 'success') {
                badge.className = "flex items-center gap-1.5 text-[10px] bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-bold uppercase tracking-wider border border-emerald-100 transition-colors duration-300";
                dot.className = "w-1.5 h-1.5 bg-emerald-500 rounded-full";
                text.textContent = "Sincronizado";
            }
        }

        async function fetchApps() {
            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/`);
                
                if (response.status === 403) {
                    throw new Error('Límite de peticiones a GitHub excedido. Por favor, inténtelo de nuevo más tarde.');
                }
                if (!response.ok) {
                    throw new Error('No se ha podido conectar con el repositorio.');
                }
                
                const files = await response.json();
                allApps = files.filter(f => f.name.endsWith('.html') && !CONFIG.exclude.includes(f.name));

                updateStatus('success');
                renderApps(allApps);

            } catch (error) {
                updateStatus('error');
                listContainer.innerHTML = `
                    <div class="col-span-full bg-red-50/50 backdrop-blur-sm border border-red-100 p-8 rounded-3xl text-red-800 flex flex-col items-center justify-center text-center gap-4">
                        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-2">
                            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="font-bold text-lg">Error de sincronización</p>
                            <p class="text-sm opacity-80 mt-1 max-w-md">${error.message}</p>
                        </div>
                    </div>`;
            }
        }

        function renderApps(apps) {
            listContainer.innerHTML = '';

            if (apps.length === 0) {
                listContainer.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-400">
                        <svg class="w-12 h-12 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                        </svg>
                        <p class="italic text-center">No se encontraron herramientas en el catálogo.</p>
                    </div>`;
                return;
            }

            apps.forEach(app => {
                const rawName = app.name.replace('.html', '');
                const cleanName = rawName
                    .replace(/-/g, ' ')
                    .replace(/\b\w/g, l => l.toUpperCase());

                const card = document.createElement('a');
                card.href = app.name;
                card.className = "group glass-card p-6 rounded-3xl shadow-sm hover:shadow-xl hover:shadow-blue-900/5 hover:border-blue-400 hover:-translate-y-1.5 transition-all duration-300 flex flex-col justify-between min-h-[176px]";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-5">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center group-hover:bg-blue-600 group-hover:rotate-3 group-hover:scale-110 transition-all duration-300">
                                <svg class="w-6 h-6 text-blue-600 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest group-hover:text-blue-300 transition-colors">Digital Tool</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-xl leading-tight mb-2 group-hover:text-blue-700 transition-colors text-balance">${cleanName}</h3>
                    </div>
                    <div class="flex items-center gap-2 pt-4 border-t border-slate-100 group-hover:border-blue-100 mt-2">
                        <span class="text-[11px] font-bold text-blue-600 uppercase tracking-tighter">Acceder al recurso</span>
                        <svg class="w-3.5 h-3.5 text-blue-600 transform group-hover:translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            clearButton.classList.toggle('hidden', term.length === 0);
            
            const filtered = allApps.filter(app => app.name.toLowerCase().replace(/-/g, ' ').includes(term));
            renderApps(filtered);
        });

        clearButton.addEventListener('click', () => {
            searchInput.value = '';
            clearButton.classList.add('hidden');
            searchInput.focus();
            renderApps(allApps);
        });

        fetchApps();
    </script>
</body>
</html>
